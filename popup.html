<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      max-height: 500px;
      overflow-y: auto;
      font-family: "Roboto", Arial, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #212121;
      border-bottom: 1px solid #3f3f3f;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f1f1f1;
    }

    #clearBtn {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
    }

    #clearBtn:hover {
      background: #333;
      color: #f1f1f1;
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: #717171;
      font-size: 13px;
    }

    .group {
      border-bottom: 1px solid #272727;
    }

    .group-header {
      padding: 8px 16px;
      background: #181818;
      font-size: 11px;
      color: #717171;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sticker-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-top: 1px solid #272727;
    }

    .sticker-card:hover {
      background: #1a1a1a;
    }

    .sticker-thumb {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 4px;
      background: #272727;
      flex-shrink: 0;
    }

    .sticker-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      background: #272727;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .sticker-info {
      flex: 1;
      overflow: hidden;
    }

    .sticker-page {
      font-size: 12px;
      color: #f1f1f1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sticker-time {
      font-size: 11px;
      color: #717171;
      margin-top: 2px;
    }

    .sticker-text {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sticker-card.clickable {
      cursor: pointer;
    }

    .sticker-card.clickable:hover {
      background: #1f1f1f;
      outline: 1px solid #3d3d3d;
    }

    .sticker-link {
      font-size: 10px;
      color: #3ea6ff;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sticker-arrow {
      font-size: 14px;
      color: #3ea6ff;
      flex-shrink: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-label {
      font-size: 11px;
      color: #aaa;
      min-width: 26px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: #2ba640;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <header>
    <h1>Stickers removidos</h1>
    <div class="header-actions">
      <div class="toggle-wrap">
        <span class="toggle-label" id="toggleLabel">ON</span>
        <label class="toggle">
          <input type="checkbox" id="toggleBtn" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <button id="clearBtn">Limpar</button>
    </div>
  </header>
  <div id="stickers"></div>
  <script src="popup.js"></script>
</body>
</html>
